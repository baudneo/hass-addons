network:
  23779/tcp: Port used for communication with Cync devices
  23778/tcp: Port used for the web interface to export devices (ingress)

configuration:
  secret_key:
    name: Encryption key for cloud token cache
    description: Random string used to encrypt the Cync cloud access token at rest. Required if the exporter is enabled.
  account_username:
    name: Cync Account Username
    description: The email address used for your Cync account
  account_password:
    name: Cync Account Password
    description: The password used for your Cync account
  mqtt_host:
    name: MQTT Host
    description: The hostname or IP address of your MQTT broker
  mqtt_port:
    name: MQTT Port
    description: "The port number for your MQTT broker (default: 1883)"
  mqtt_user:
    name: MQTT User
    description: The username for your MQTT broker
  mqtt_pass:
    name: MQTT Password
    description: The password for your MQTT broker
  mqtt_topic:
    name: Cync MQTT Topic
    description: The MQTT topic for Cync device messages
  debug_log_level:
    name: Debug Logging
    description: "Enable debug level logging (default: false)"
  raw_debug:
    name: Binary Debug Logging
    description: "Enable raw binary debug logging [very verbose] (default: false)"
  mqtt_debug:
    name: MQTT Debug Logging
    description: "Enable debug logging for MQTT messages [cuts down on log spam when off] (default: false)"
  app_mitm_log:
    name: App MITM Logging
    description: "Log MITM proxy requests from/to all Cync app instances (default: false)"
  app_mitm_console:
    name: App MITM Console
    description: "Show MITM proxy requests from/to all Cync app instances in the log console (default: true)"
  dev_mitm_console:
    name: Device MITM Console
    description: "Show MITM proxy requests from/to all Cync devices in the log console (default: true)"
  cync_cloud_ip:
    name: Cync Cloud IP
    description: "The IP address of the Cync cloud server (default: 34.73.130.191)"
  tuning:
    name: Tunables
    description: Tunables to dial-in command latency
